    <script>
        function openPlayer(name, url) {

            // paksa autoplay & unmute
            if (!url.includes("mute=")) {
                url += (url.includes("?") ? "&" : "?") + "autoplay=1&mute=0";
            }

            // fullscreen dari klik user
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();

            // pindah halaman
            window.location.href = "player.html?name=" + encodeURIComponent(name) + "&url=" + encodeURIComponent(url);
        }
    </script>
