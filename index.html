<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>STB TV Mode</title>

<style>
body {
    margin: 0;
    background: #0f172a;
    font-family: Arial;
    color: white;
}

h1 {
    text-align: center;
    padding: 15px;
}

/* GRID */
.container {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    padding: 20px;
}

/* CHANNEL */
.channel {
    background: #1e293b;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    font-size: 20px;
    transition: 0.2s;
}

/* FOCUS (ini penting buat remote) */
.channel.active {
    border: 3px solid #38bdf8;
    transform: scale(1.08);
    background: #334155;
}

.online { color: #22c55e; }
.offline { color: #ef4444; }
</style>
</head>

<body>

<h1>📺 STB LIVE TV</h1>

<div class="container" id="grid">

<div class="channel" data-url="https://sindikasi.inews.id/embed/video/YWdlbnQ9ZGVza3RvcCZ1cmw9aHR0cHMlM0ElMkYlMkZlbWJlZC5yY3RpcGx1cy5jb20lMkZsaXZlJTJGcmN0aSUyRmluZXdzaWQmaGVpZ2h0PTEwMCUyNSZ3aWR0aD0xMDAlMjU=">
RCTI<br><span class="online">✔️</span>
</div>

<div class="channel" data-url="https://sindikasi.inews.id/embed/video/YWdlbnQ9ZGVza3RvcCZ1cmw9aHR0cHMlM0ElMkYlMkZlbWJlZC5yY3RpcGx1cy5jb20lMkZsaXZlJTJGZ3R2JTJGaW5ld3NpZCZoZWlnaHQ9MTAwJTI1JndpZHRoPTEwMCUyNQ==">
GTV<br><span class="online">✔️</span>
</div>

<div class="channel" data-url="https://20.detik.com/watch/livestreaming-trans7">
TRANS7<br><span class="online">✔️</span>
</div>

<div class="channel" data-url="https://www.cnnindonesia.com/tv/embed?ref=transmedia">
CNN<br><span class="online">✔️</span>
</div>

<div class="channel" data-url="https://www.vidio.com/live/204-sctv-tv-stream/embed?autoplay=1&mute=0">
SCTV<br><span class="online">✔️</span>
</div>

<div class="channel" data-url="https://www.dailymotion.com/embed/video/k236ofBIxajxDiti8CY?autoplay=1">
METRO TV<br><span class="online">✔️</span>
</div>

<div class="channel" data-url="https://www.dailymotion.com/embed/video/k46igSmSMGBIiWsXtWk?autoplay=1">
KOMPAS TV<br><span class="online">✔️</span>
</div>

<div class="channel" data-url="https://beritasatu.tv/playstream.php">
BERITA SATU<br><span class="online">✔️</span>
</div>

</div>

<script>
const channels = document.querySelectorAll(".channel");
let index = 0;

// set awal
channels[index].classList.add("active");

// navigasi remote / keyboard
document.addEventListener("keydown", (e) => {

    channels[index].classList.remove("active");

    if (e.key === "ArrowRight") index++;
    if (e.key === "ArrowLeft") index--;
    if (e.key === "ArrowDown") index += 4;
    if (e.key === "ArrowUp") index -= 4;

    // batas
    if (index < 0) index = 0;
    if (index >= channels.length) index = channels.length - 1;

    channels[index].classList.add("active");

    // auto scroll
    channels[index].scrollIntoView({
        behavior: "smooth",
        block: "center"
    });

    // ENTER / OK
    if (e.key === "Enter") {
        playChannel(channels[index].dataset.url);
    }
});

function playChannel(url) {

    if (!url.includes("mute=")) {
        url += (url.includes("?") ? "&" : "?") + "autoplay=1&mute=0";
    }

    // fullscreen
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();

    window.location.href = "player.html?url=" + encodeURIComponent(url);
}
</script>

</body>
</html>
