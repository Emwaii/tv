<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Live TV Player</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

/* IFRAME fullscreen */
#player {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    border: none;
}
</style>
</head>

<body>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
let url = params.get("url");

const iframe = document.getElementById("player");

// paksa autoplay & unmute
if (!url.includes("autoplay")) {
    url += (url.includes("?") ? "&" : "?") + "autoplay=1&mute=0";
}

iframe.src = url;

// force unmute (best effort)
function forceUnmute() {
    try {
        iframe.contentWindow.postMessage('{"event":"command","func":"unMute"}', '*');
    } catch(e){}
}

// spam unmute beberapa kali
setTimeout(forceUnmute, 1000);
setTimeout(forceUnmute, 3000);
setTimeout(forceUnmute, 5000);

// fallback fullscreen jika user klik
document.addEventListener("click", () => {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
}, { once: true });

</script>

</body>
</html>
