<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Live TV Coocaa</title>
<style>
html, body {
    margin:0; padding:0;
    width:100%; height:100%;
    overflow:hidden;
    background:black;
}
iframe {
    width:100vw; height:100vh;
    border:none;
    display:block;
}
</style>
</head>
<body>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<script>
const params = new URLSearchParams(window.location.search);
let url = params.get("url");

if (!url.includes("mute=")) {
    url += (url.includes("?") ? "&" : "?") + "autoplay=1&mute=0";
}

const iframe = document.getElementById("player");
iframe.src = url;

// force unmute
function forceUnmute(){
    try {
        iframe.contentWindow.postMessage('{"event":"command","func":"unMute"}','*');
    } catch(e){}
}
setTimeout(forceUnmute,1000);
setTimeout(forceUnmute,3000);

// fokus iframe → Coocaa TV hide headbar otomatis
iframe.focus();
</script>

</body>
</html>
