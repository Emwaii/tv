<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background: black;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>

<body>

    <iframe id="player" allow="autoplay; fullscreen"></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        let url = params.get("url");

        const iframe = document.getElementById("player");

        // inject autoplay tambahan
        if (!url.includes("autoplay")) {
            url += (url.includes("?") ? "&" : "?") + "autoplay=1&mute=0";
        }

        iframe.src = url;

        // fallback fullscreen
        document.addEventListener("click", () => {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
        }, { once: true });

        // force unmute (tidak 100% semua channel)
        function forceUnmute() {
            try {
                iframe.contentWindow.postMessage('{"event":"command","func":"unMute"}', '*');
            } catch (e) { }
        }

        setTimeout(forceUnmute, 1000);
        setTimeout(forceUnmute, 3000);
        setTimeout(forceUnmute, 5000);

    </script>

</body>

</html>
